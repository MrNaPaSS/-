<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Academy</title>

<!-- Meta Pixel -->
<script>
  // Клик-идентификатор: одно и то же значение уходит в браузерный пиксель (external_id)
  // и в deep-link бота (start=c_<cid>). По нему FB сшивает рекламный клик с событиями бота.
  var FB_CID = (function () {
    try {
      var a = new Uint8Array(8);
      (window.crypto || window.msCrypto).getRandomValues(a);
      return Array.prototype.map.call(a, function (x) { return ('0' + x.toString(16)).slice(-2); }).join('');
    } catch (_) {
      return (Date.now().toString(36) + Math.random().toString(36).slice(2, 10)).slice(0, 16);
    }
  })();

  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '988255423559722', { external_id: FB_CID });
  fbq('track', 'PageView');
</script>
<noscript>
  <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=988255423559722&ev=PageView&noscript=1"/>
</noscript>

<style>
  html,body{margin:0;height:100%;background:#0f1115;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px;box-sizing:border-box}
  .spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.25);
    border-top-color:#229ED9;border-radius:50%;animation:s 1s linear infinite;margin-bottom:22px}
  @keyframes s{to{transform:rotate(360deg)}}
  .logo{font-size:22px;font-weight:700;margin-bottom:8px}
  .sub{opacity:.75;font-size:15px;margin-bottom:26px;max-width:320px;line-height:1.4}
  .btn{display:inline-block;background:#229ED9;color:#fff;text-decoration:none;
    font-size:18px;font-weight:600;padding:16px 30px;border-radius:14px;min-width:240px;
    box-shadow:0 6px 20px rgba(34,158,217,.35);cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .hint{margin-top:18px;font-size:13px;opacity:.6;max-width:320px;line-height:1.45}
</style>
</head>
<body>
<div class="wrap">
  <div class="spin" id="spin"></div>
  <div class="logo">Trading Academy</div>
  <div class="sub" id="sub">Открываем Telegram...</div>
  <a class="btn" id="go" href="https://t.me/moneyhoney7_bot" rel="noopener">Открыть Telegram</a>
  <div class="hint" id="hint"></div>
</div>

<script>
  (function () {
    var BOT = 'moneyhoney7_bot';
    var TG_PACKAGE = 'org.telegram.messenger';

    var params = new URLSearchParams(window.location.search);
    var ref = params.get('ref');
    var setupMode = params.get('setup') === '1'; // режим привязки FB-события (без авто-редиректа)
    // Реферальная ссылка в приоритете; для рекламного трафика передаём клик-идентификатор.
    var payload = ref ? ('ref_' + ref) : ('c_' + FB_CID);
    var qWeb = payload ? ('?start=' + encodeURIComponent(payload)) : '';
    var qApp = payload ? ('&start=' + encodeURIComponent(payload)) : '';

    var webUrl = 'https://t.me/' + BOT + qWeb;
    var tgUrl  = 'tg://resolve?domain=' + BOT + qApp;
    // Android: intent:// с пакетом Telegram + web-фолбэк (открывает приложение из webview надёжнее всего).
    var intentUrl = 'intent://resolve?domain=' + BOT + qApp +
      '#Intent;scheme=tg;package=' + TG_PACKAGE +
      ';S.browser_fallback_url=' + encodeURIComponent(webUrl) + ';end';

    var ua = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var inApp = /FBAN|FBAV|FB_IAB|Instagram|Messenger|Line/i.test(ua);

    function openTelegram() {
      if (isAndroid) {
        // intent:// сам откроет Telegram, а если его нет - уйдёт на browser_fallback_url.
        window.location.href = intentUrl;
        return;
      }
      // iOS и прочее: пробуем нативную схему, затем web-фолбэк.
      try { window.location.href = tgUrl; } catch (_) {}
      setTimeout(function () { window.location.href = webUrl; }, 700);
    }

    var go = document.getElementById('go');
    go.setAttribute('href', webUrl);
    go.addEventListener('click', function (e) {
      e.preventDefault();
      if (setupMode) return; // в режиме настройки не уводим со страницы
      openTelegram();
    });

    if (setupMode) {
      // Режим привязки FB-события (?setup=1): без авто-редиректа, кнопка просто висит.
      document.getElementById('spin').style.display = 'none';
      document.getElementById('sub').textContent = 'Режим настройки: привяжите событие Contact к этой кнопке';
      document.getElementById('hint').textContent = 'Временный режим ?setup=1, авто-переход отключён.';
    } else if (inApp) {
      // Встроенный браузер Instagram/Facebook: не редиректим сами - открываем по тапу.
      document.getElementById('spin').style.display = 'none';
      document.getElementById('sub').textContent = 'Нажмите кнопку, чтобы войти в Telegram';
      var tip = isIOS
        ? 'Если Telegram не открылся - нажмите значок "..." справа вверху и выберите "Открыть во внешнем браузере", затем нажмите кнопку снова.'
        : 'Если Telegram не открылся - нажмите "⋮" справа вверху и выберите "Открыть в Chrome", затем нажмите кнопку снова.';
      document.getElementById('hint').textContent = tip;
    } else {
      // Обычный браузер: авто-переход + кнопка как запасной вариант.
      setTimeout(openTelegram, 1200);
    }
  })();
</script>
</body>
</html>
